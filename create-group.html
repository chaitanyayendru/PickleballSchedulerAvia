<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create a group · Pickleball Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%239fdc1a'/%3E%3C/svg%3E" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-dot"></span> Pickleball Scheduler</a>
      <div class="nav-links"></div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <main class="container" style="max-width: 640px;">
    <h1>Create a group</h1>
    <p class="muted">You'll be the captain — automatically added as the first member. You can add a few names now to hold seats, or leave them blank and let people join via requests. <strong>A group needs 4 members before it can book a slot.</strong></p>

    <div class="card" style="margin-top: 18px;" id="card">
      <div class="skeleton" style="height: 200px;"></div>
    </div>
  </main>

  <footer class="footer">Pickleball Scheduler</footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { mountNav } from './js/auth.js';
    import { currentIdentity } from './js/supabase-client.js';
    import { createGroup } from './js/joins.js';
    import { toast, el } from './js/util.js';

    await mountNav('dashboard');

    const card = document.getElementById('card');
    const id = await currentIdentity();

    if (id.kind === 'none') {
      card.innerHTML = '<p>You need to <a href="login.html">log in</a> or <a href="signup.html">sign up</a> before creating a group.</p>';
    } else if (id.kind === 'group') {
      card.innerHTML = `<p>You already captain <strong>${escapeHtml(id.group.name)}</strong>. Each individual can captain at most one group.</p>
        <p><a class="btn btn-primary" href="dashboard.html">Go to dashboard</a></p>`;
    } else {
      card.innerHTML = '';
      card.appendChild(renderForm());
    }

    function renderForm() {
      const form = document.createElement('form');
      form.id = 'create-form';
      form.className = 'stack';
      form.autocomplete = 'off';

      form.appendChild(el('div', { class: 'field' }, [
        el('label', { for: 'name' }, 'Group name'),
        (() => { const i = document.createElement('input'); i.id = 'name'; i.name = 'name'; i.type = 'text'; i.required = true; i.maxLength = 40; i.placeholder = 'e.g. Morning Smashers'; return i; })(),
        el('div', { class: 'hint' }, '2–40 characters. Must be unique.'),
      ]));

      form.appendChild(el('div', { class: 'field' }, [
        el('label', {}, 'Other members (optional)'),
        el('div', { class: 'hint', style: { marginBottom: '6px' } }, 'Up to 5 additional names — these are placeholder seats. Real members can join by requesting from the Groups page.'),
        (() => {
          const grid = el('div', { class: 'grid-2' });
          for (let i = 2; i <= 6; i++) {
            const fld = el('div', { class: 'field' });
            const inp = document.createElement('input');
            inp.type = 'text'; inp.name = 'm' + i; inp.maxLength = 40;
            inp.placeholder = `Member ${i} (optional)`;
            fld.appendChild(inp);
            grid.appendChild(fld);
          }
          return grid;
        })(),
      ]));

      const errBox = el('div', { id: 'create-error' });
      form.appendChild(errBox);

      const submit = document.createElement('button');
      submit.className = 'btn btn-primary btn-block';
      submit.type = 'submit';
      submit.textContent = 'Create group';
      form.appendChild(submit);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.innerHTML = '';
        const extras = [];
        for (let i = 2; i <= 6; i++) {
          const v = form.elements['m' + i].value;
          if (v) extras.push(v);
        }
        submit.disabled = true; submit.textContent = 'Creating…';
        try {
          await createGroup({ name: form.name.value, additionalMembers: extras });
          toast('Group created. You\'re the captain.', 'success');
          setTimeout(() => location.href = 'dashboard.html', 500);
        } catch (err) {
          errBox.innerHTML = '<div class="banner banner-error">' + (err.message || String(err)) + '</div>';
          submit.disabled = false; submit.textContent = 'Create group';
        }
      });

      return form;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[c]));
    }
  </script>
</body>
</html>
