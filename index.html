<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pickleball Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%239fdc1a'/%3E%3C/svg%3E" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span>
        Pickleball Scheduler
      </a>
      <div class="nav-links"></div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <main class="container">
    <div class="card-header">
      <div>
        <h1>This week's court</h1>
        <p class="muted">Click any free slot to book. Open 24 hours.</p>
      </div>
    </div>

    <div id="scheduler"></div>
  </main>

  <footer class="footer">
    Community pickleball court · open 24h · static site hosted on GitHub Pages
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { mountNav } from './js/auth.js';
    import { WeekScheduler } from './js/scheduler.js';
    import { toast } from './js/util.js';

    (async () => {
      try {
        await mountNav('home');
        const sched = new WeekScheduler(document.getElementById('scheduler'));
        await sched.init();
      } catch (e) {
        console.error(e);
        const main = document.querySelector('main');
        main.innerHTML = '<div class="banner banner-error">' +
          'Could not load the schedule: ' + (e.message || e) +
          '<br><br>If this is your first time setting up, copy <code>js/config.example.js</code> to <code>js/config.js</code> ' +
          'and fill in your Supabase URL and anon key. See <a href="https://github.com/">README</a> for setup.' +
          '</div>';
      }
    })();
  </script>
</body>
</html>
