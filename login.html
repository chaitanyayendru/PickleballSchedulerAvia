<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in · Pickleball Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%239fdc1a'/%3E%3C/svg%3E" />
  <style>
    .tabs { display: flex; gap: 4px; background: var(--surface-2); padding: 4px; border-radius: var(--radius-sm); margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 8px 12px; text-align: center; cursor: pointer;
      border-radius: calc(var(--radius-sm) - 2px); font-weight: 600; font-size: 0.9rem;
      color: var(--text-soft); transition: background 0.1s, color 0.1s;
      border: none; background: transparent;
    }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
    .tab:hover:not(.active) { color: var(--text); }
    .login-pane { display: none; }
    .login-pane.active { display: block; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-dot"></span> Pickleball Scheduler</a>
      <div class="nav-links"></div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <main class="container" style="max-width: 480px;">
    <h1>Log in</h1>

    <div class="card" style="margin-top: 18px;">
      <div class="tabs" role="tablist">
        <button class="tab active" data-pane="group"      role="tab">Group (PIN)</button>
        <button class="tab"        data-pane="individual" role="tab">Individual</button>
      </div>

      <!-- Group PIN pane -->
      <div class="login-pane active" id="pane-group">
        <form id="group-form" class="stack" autocomplete="off">
          <div class="field">
            <label for="g-name">Group name</label>
            <input id="g-name" name="name" type="text" required maxlength="40" />
          </div>
          <div class="field">
            <label for="g-pin">PIN</label>
            <input id="g-pin" name="pin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" required />
          </div>
          <div id="group-error"></div>
          <button class="btn btn-primary btn-block" type="submit">Log in as group</button>
          <div class="dim" style="text-align: center;">
            No group yet? <a href="register.html">Register one</a>
          </div>
        </form>
      </div>

      <!-- Individual pane -->
      <div class="login-pane" id="pane-individual">
        <form id="ind-form" class="stack" autocomplete="off">
          <div class="field">
            <label for="i-email">Email</label>
            <input id="i-email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="i-password">Password</label>
            <input id="i-password" name="password" type="password" required minlength="8" />
          </div>
          <div id="ind-error"></div>
          <button class="btn btn-primary btn-block" type="submit">Log in</button>
          <div class="dim" style="text-align: center;">
            New here? <a href="signup.html">Sign up as an individual</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">Pickleball Scheduler</footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { mountNav, loginGroup, loginIndividual } from './js/auth.js';
    import { toast } from './js/util.js';

    mountNav('login');

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.login-pane').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('pane-' + tab.dataset.pane).classList.add('active');
      });
    });

    document.getElementById('group-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('group-error');
      errBox.innerHTML = '';
      const f = e.target;
      const btn = f.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        await loginGroup({ name: f.name.value, pin: f.pin.value });
        toast('Logged in.', 'success');
        setTimeout(() => location.href = 'dashboard.html', 400);
      } catch (e) {
        errBox.innerHTML = '<div class="banner banner-error">' + (e.message || String(e)) + '</div>';
        btn.disabled = false; btn.textContent = 'Log in as group';
      }
    });

    document.getElementById('ind-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('ind-error');
      errBox.innerHTML = '';
      const f = e.target;
      const btn = f.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        await loginIndividual({ email: f.email.value, password: f.password.value });
        toast('Logged in.', 'success');
        setTimeout(() => location.href = 'dashboard.html', 400);
      } catch (e) {
        errBox.innerHTML = '<div class="banner banner-error">' + (e.message || String(e)) + '</div>';
        btn.disabled = false; btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
