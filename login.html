<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in · Pickleball Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%239fdc1a'/%3E%3C/svg%3E" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-dot"></span> Pickleball Scheduler</a>
      <div class="nav-links"></div>
      <div class="nav-right"></div>
    </div>
  </nav>

  <main class="container" style="max-width: 440px;">
    <h1>Log in</h1>
    <p class="muted">Use the email and password you signed up with.</p>

    <div class="card" style="margin-top: 18px;">
      <form id="login-form" class="stack" autocomplete="off">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="8" />
        </div>
        <div id="login-error"></div>
        <button class="btn btn-primary btn-block" type="submit">Log in</button>
        <div class="dim" style="text-align: center;">
          No account yet? <a href="signup.html">Sign up</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">Pickleball Scheduler</footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { mountNav, loginIndividual } from './js/auth.js';
    import { toast } from './js/util.js';

    mountNav('login');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('login-error');
      errBox.innerHTML = '';
      const f = e.target;
      const btn = f.querySelector('button[type=submit]');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        await loginIndividual({ email: f.email.value, password: f.password.value });
        toast('Logged in.', 'success');
        setTimeout(() => location.href = 'dashboard.html', 400);
      } catch (e) {
        errBox.innerHTML = '<div class="banner banner-error">' + (e.message || String(e)) + '</div>';
        btn.disabled = false; btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
